<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Decisions – {{WORKSPACE_NAME}} – Structurizr</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png"/>
    <link rel="stylesheet" href="/static/css/bootstrap-5.3.7.min.css"/>
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.min.css"/>
    <style>
        body { background: var(--bs-body-bg); }
        .decision-row { cursor: pointer; }
        .decision-row:hover { background: var(--bs-tertiary-bg); }
        #reload-banner { display: none; position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
        .status-badge-Proposed    { background-color: #0d6efd !important; }
        .status-badge-Accepted    { background-color: #198754 !important; }
        .status-badge-Superseded  { background-color: #6c757d !important; }
        .status-badge-Deprecated  { background-color: #dc3545 !important; }
        .status-badge-Rejected    { background-color: #dc3545 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/">
            <img src="/static/img/structurizr-logo.png" alt="Structurizr" height="28" class="me-2"/>
            Structurizr
        </a>
        <ol class="breadcrumb mb-0 ms-2">
            <li class="breadcrumb-item"><a href="/">Workspaces</a></li>
            <li class="breadcrumb-item"><a href="/workspace/{{WORKSPACE_SLUG}}">{{WORKSPACE_NAME}}</a></li>
            <li class="breadcrumb-item active">Decisions</li>
        </ol>
        <div class="ms-auto">
            <button id="themeToggle" class="btn btn-sm btn-outline-secondary" title="Toggle dark mode">
                <i class="bi bi-circle-half"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex align-items-center mb-3">
        <h4 class="mb-0 me-auto"><i class="bi bi-journal-text me-2"></i>Architecture Decision Records</h4>
    </div>

    <div id="no-decisions" class="text-center text-muted py-5" style="display:none">
        <i class="bi bi-journal-x fs-1"></i>
        <p class="mt-2">No architecture decision records found in this workspace.</p>
    </div>

    <div class="table-responsive" id="decisions-table-wrap">
        <table class="table table-hover align-middle" id="decisions-table" style="display:none">
            <thead class="table-light">
                <tr>
                    <th style="width:5rem">ID</th>
                    <th style="width:8rem">Date</th>
                    <th>Title</th>
                    <th style="width:9rem">Status</th>
                </tr>
            </thead>
            <tbody id="decisions-tbody"></tbody>
        </table>
    </div>
</div>

<div id="reload-banner">
    <div class="alert alert-info alert-dismissible mb-0 shadow" role="alert">
        <i class="bi bi-arrow-clockwise me-1"></i> Workspace reloaded
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<script src="/static/js/bootstrap-5.3.7.min.js"></script>
<script>
(function() {
    var WORKSPACE_SLUG = '{{WORKSPACE_SLUG}}';

    // ---- theme ----
    const THEME_KEY = 'structurizrx-theme';
    function applyTheme(t) {
        document.documentElement.setAttribute('data-bs-theme', t);
        localStorage.setItem(THEME_KEY, t);
    }
    var saved = localStorage.getItem(THEME_KEY) ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(saved);
    document.getElementById('themeToggle').addEventListener('click', function() {
        var cur = document.documentElement.getAttribute('data-bs-theme');
        applyTheme(cur === 'dark' ? 'light' : 'dark');
    });

    // ---- status badge colour ----
    function statusClass(status) {
        var s = (status || '').trim();
        return 'status-badge-' + s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
    }

    function escHtml(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---- render decisions ----
    function renderDecisions(list) {
        var tbody = document.getElementById('decisions-tbody');
        var table = document.getElementById('decisions-table');
        var noDecisions = document.getElementById('no-decisions');
        tbody.innerHTML = '';

        if (!list || list.length === 0) {
            table.style.display = 'none';
            noDecisions.style.display = '';
            return;
        }

        noDecisions.style.display = 'none';
        table.style.display = '';

        list.forEach(function(d) {
            var tr = document.createElement('tr');
            tr.className = 'decision-row';
            tr.innerHTML =
                '<td><span class="fw-mono">' + escHtml(d.id) + '</span></td>' +
                '<td><small class="text-muted">' + escHtml(d.date || '') + '</small></td>' +
                '<td>' + escHtml(d.title) + '</td>' +
                '<td><span class="badge ' + statusClass(d.status) + '">' + escHtml(d.status || '') + '</span></td>';
            tr.addEventListener('click', function() {
                location.href = '/workspace/' + encodeURIComponent(WORKSPACE_SLUG) +
                    '/decisions/' + encodeURIComponent(d.id);
            });
            tbody.appendChild(tr);
        });
    }

    function loadDecisions() {
        fetch('/api/workspace/' + encodeURIComponent(WORKSPACE_SLUG) + '/decisions')
            .then(function(r) { return r.json(); })
            .then(renderDecisions)
            .catch(console.error);
    }

    loadDecisions();

    // ---- WebSocket live reload ----
    function connectWs() {
        var proto = location.protocol === 'https:' ? 'wss' : 'ws';
        var ws = new WebSocket(proto + '://' + location.host + '/ws');
        ws.onmessage = function(e) {
            var msg = JSON.parse(e.data);
            if (msg.type === 'reload') {
                loadDecisions();
                var banner = document.getElementById('reload-banner');
                banner.style.display = '';
                setTimeout(function() { banner.style.display = 'none'; }, 3000);
            }
        };
        ws.onclose = function() { setTimeout(connectWs, 2000); };
    }
    connectWs();
})();
</script>
</body>
</html>
