<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{{WORKSPACE_NAME}} – Structurizr</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png"/>
    <link rel="stylesheet" href="/static/css/bootstrap-5.3.7.min.css"/>
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/static/css/structurizr.css"/>
    <link rel="stylesheet" href="/static/css/structurizr-static.css"/>
    <link rel="stylesheet" href="/static/css/structurizr-dark.css"/>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        #app { display: flex; height: 100vh; flex-direction: column; }
        #topbar { flex-shrink: 0; }
        #content { display: flex; flex: 1; overflow: hidden; }
        #sidebar {
            width: 280px; min-width: 200px; max-width: 400px;
            flex-shrink: 0; overflow-y: auto;
            border-right: 1px solid var(--bs-border-color);
            background: var(--bs-body-bg);
        }
        #sidebar-toggle-btn { display: none; }
        #diagram-area { flex: 1; overflow: hidden; position: relative; }
        #diagramContainer { width: 100%; height: 100%; }
        .view-item {
            display: block; padding: .35rem .75rem; border-radius: .25rem;
            text-decoration: none; color: var(--bs-body-color);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-size: .875rem;
        }
        .view-item:hover { background: var(--bs-tertiary-bg); color: var(--bs-body-color); }
        .view-item.active { background: var(--bs-primary); color: #fff; }
        .view-group-header {
            font-size: .7rem; text-transform: uppercase; letter-spacing: .05em;
            color: var(--bs-secondary-color); padding: .5rem .75rem .1rem;
            font-weight: 600;
        }
        #status-bar {
            font-size: .75rem; color: var(--bs-secondary-color);
            padding: .15rem .75rem;
            border-top: 1px solid var(--bs-border-color);
            background: var(--bs-body-bg);
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            #sidebar { display: none; }
            #sidebar.open { display: block; position: fixed; left: 0; top: 0; bottom: 0; z-index: 1000; }
            #sidebar-toggle-btn { display: inline-block; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Top bar -->
    <nav id="topbar" class="navbar navbar-expand-sm bg-body-tertiary border-bottom px-3 py-1">
        <button id="sidebar-toggle-btn" class="btn btn-sm btn-outline-secondary me-2" title="Toggle sidebar">
            <i class="bi bi-layout-sidebar"></i>
        </button>
        <a class="navbar-brand fw-semibold me-2 text-decoration-none" href="/">
            <img src="/static/img/structurizr-logo.png" alt="" height="22" class="me-1"/>
        </a>
        <span class="navbar-text fw-semibold me-auto" id="ws-title">{{WORKSPACE_NAME}}</span>

        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-secondary" id="view-type-badge" style="display:none"></span>
            <button class="btn btn-sm btn-outline-secondary" id="btnFitView" title="Fit diagram to window (F)">
                <i class="bi bi-fullscreen"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle dark mode">
                <i class="bi bi-circle-half"></i>
            </button>
        </div>
    </nav>

    <!-- Main content -->
    <div id="content">
        <!-- Sidebar -->
        <nav id="sidebar" class="py-2">
            <div id="view-list"></div>
        </nav>

        <!-- Diagram area -->
        <div id="diagram-area">
            <div id="diagramContainer"></div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <span id="status-msg">Loading…</span>
    </div>
</div>

<!-- Structurizr viewer scripts -->
<script src="/static/js/jquery-3.7.1.min.js"></script>
<script src="/static/js/bootstrap-5.3.7.min.js"></script>
<script src="/static/js/jointjs-Core-4.1.3.js"></script>
<script src="/static/js/dagre-1.1.8.js"></script>
<script src="/static/js/graphlib-2.2.4.min.js"></script>
<script src="/static/js/jointjs-DirectedGraph-4.1.3.min.js"></script>
<script src="/static/js/structurizr.js"></script>
<script src="/static/js/structurizr-util.js"></script>
<script src="/static/js/structurizr-ui.js"></script>
<script src="/static/js/structurizr-workspace.js"></script>
<script src="/static/js/structurizr-diagram.js"></script>

<script>
(function() {
    const WORKSPACE_NAME = '{{WORKSPACE_NAME}}';
    const WORKSPACE_SLUG = '{{WORKSPACE_SLUG}}';

    // ---- theme ----
    const THEME_KEY = 'structurizrx-theme';
    function applyTheme(t) {
        document.documentElement.setAttribute('data-bs-theme', t);
        localStorage.setItem(THEME_KEY, t);
        if (diagram) diagram.setDarkMode(t === 'dark');
    }
    const savedTheme = localStorage.getItem(THEME_KEY) ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
    });

    // ---- sidebar toggle (mobile) ----
    document.getElementById('sidebar-toggle-btn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    let diagram = null;
    let workspaceObj = null;
    let currentViewKey = null;

    function setStatus(msg) {
        document.getElementById('status-msg').textContent = msg;
    }

    // ---- Load and render workspace ----
    function loadWorkspace(jumpToKey) {
        fetch('/api/workspace/' + encodeURIComponent(WORKSPACE_SLUG))
            .then(r => r.json())
            .then(json => {
                initWorkspace(json, jumpToKey || location.hash.replace('#', '') || null);
            })
            .catch(e => {
                setStatus('Error loading workspace: ' + e.message);
            });
    }

    function initWorkspace(json, jumpToKey) {
        try {
            workspaceObj = new structurizr.Workspace(json);
            structurizr.workspace = workspaceObj;
        } catch(e) {
            setStatus('Error: ' + e.message);
            return;
        }

        buildSidebar(workspaceObj);

        const views = workspaceObj.views;
        const allViews = collectAllViews(views);

        if (allViews.length === 0) {
            setStatus('No diagrams in this workspace.');
            return;
        }

        // Pick initial view
        let firstKey = jumpToKey || views.configuration?.defaultView || allViews[0].key;
        if (!allViews.find(v => v.key === firstKey)) firstKey = allViews[0].key;

        showView(firstKey, json);
    }

    function collectAllViews(views) {
        const lists = [
            views.systemLandscapeViews,
            views.systemContextViews,
            views.containerViews,
            views.componentViews,
            views.dynamicViews,
            views.deploymentViews,
            views.filteredViews,
            views.imageViews,
            views.customViews,
        ];
        return lists.flatMap(l => l || []).filter(v => v.key);
    }

    function showView(key, workspaceJson) {
        currentViewKey = key;
        location.hash = key;

        // Update active state in sidebar
        document.querySelectorAll('.view-item').forEach(el => {
            el.classList.toggle('active', el.dataset.key === key);
        });

        // Destroy previous diagram
        if (diagram) {
            try { diagram.destroy(); } catch(_) {}
            diagram = null;
        }
        document.getElementById('diagramContainer').innerHTML = '';

        const view = workspaceObj.getViewByKey(key);
        if (!view) {
            setStatus('View not found: ' + key);
            return;
        }

        setStatus(view.title || key);
        const badge = document.getElementById('view-type-badge');
        badge.style.display = '';
        badge.textContent = view.type || '';

        // Create the diagram
        diagram = new structurizr.ui.Diagram('diagramContainer', false, function() {
            diagram.setDarkMode(document.documentElement.getAttribute('data-bs-theme') === 'dark');
            diagram.renderView(view, workspaceObj);
        });
    }

    // ---- Sidebar ----
    function buildSidebar(wsObj) {
        const groups = [
            { label: 'Landscape',        views: wsObj.views.systemLandscapeViews },
            { label: 'System Context',   views: wsObj.views.systemContextViews },
            { label: 'Container',        views: wsObj.views.containerViews },
            { label: 'Component',        views: wsObj.views.componentViews },
            { label: 'Dynamic',          views: wsObj.views.dynamicViews },
            { label: 'Deployment',       views: wsObj.views.deploymentViews },
            { label: 'Filtered',         views: wsObj.views.filteredViews },
            { label: 'Image',            views: wsObj.views.imageViews },
            { label: 'Custom',           views: wsObj.views.customViews },
        ];

        const list = document.getElementById('view-list');
        list.innerHTML = '';

        groups.forEach(g => {
            if (!g.views || g.views.length === 0) return;
            const hdr = document.createElement('div');
            hdr.className = 'view-group-header';
            hdr.textContent = g.label;
            list.appendChild(hdr);

            g.views.forEach(v => {
                if (!v.key) return;
                const a = document.createElement('a');
                a.className = 'view-item';
                a.href = '#' + v.key;
                a.dataset.key = v.key;
                a.title = v.description || '';
                a.textContent = v.title || v.key;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    showView(v.key);
                    // close mobile sidebar
                    document.getElementById('sidebar').classList.remove('open');
                });
                list.appendChild(a);
            });
        });
    }

    // ---- Fit/zoom keyboard shortcut ----
    document.getElementById('btnFitView').addEventListener('click', () => {
        if (diagram) diagram.fit();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'f' || e.key === 'F') {
            if (diagram) diagram.fit();
        }
    });

    // ---- WebSocket live reload ----
    function connectWs() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'reload') {
                setStatus('Reloading…');
                loadWorkspace(currentViewKey);
            }
        };
        ws.onclose = () => setTimeout(connectWs, 2000);
    }
    connectWs();

    // ---- Initial load ----
    loadWorkspace(location.hash.replace('#', '') || null);
})();
</script>
</body>
</html>
